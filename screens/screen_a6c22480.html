<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skyward Vintage - Login</title>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols for Nav Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#bd660f',
              light: '#f7e8d8',
              dark: '#8a4b0b',
            },
            retro: {
              paper: '#fdfcf8',
              ink: '#2c2c2c',
              border: '#d1cfc7',
            }
          },
          fontFamily: {
            sans: ['"Space Grotesk"', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #fdfcf8;
      background-image: radial-gradient(#d1cfc7 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      color: #2c2c2c;
    }
    .input-vintage {
      border: 1.5px solid #d1cfc7;
      background-color: transparent;
      transition: border-color 0.2s ease;
    }
    .input-vintage:focus {
      border-color: #bd660f;
      ring: none;
      outline: none;
    }
    .retro-shadow {
      box-shadow: 4px 4px 0px 0px rgba(189, 102, 15, 0.2);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-retro-border px-6 py-4" data-purpose="page-header">
<div class="max-w-7xl mx-auto flex justify-between items-center">
<div class="flex items-center space-x-8">
<!-- Retro Logo -->
<a class="flex items-center space-x-3 group" href="#">
<div class="w-10 h-10 bg-brand flex items-center justify-center rounded-custom transition-transform group-hover:scale-105" data-purpose="logo-icon">
<svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-xl font-bold tracking-tight uppercase italic text-brand">RETRO SKIES</h1>
</a>
<!-- Navigation Links -->
<nav class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase tracking-widest text-gray-500">
<a class="hover:text-brand transition-colors" href="#">Home</a>
<a class="hover:text-brand transition-colors" href="#">Book</a>
<a class="hover:text-brand transition-colors" href="#">My Trips</a>
</nav>
</div>
<!-- User Profile -->
<div class="flex items-center space-x-4">
<nav class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase tracking-widest text-gray-500 mr-2">
<a class="hover:text-brand transition-colors" href="#">Profile</a>
</nav>
<div class="w-10 h-10 rounded-full border-2 border-brand bg-brand-light flex items-center justify-center overflow-hidden cursor-pointer">
<span class="material-symbols-outlined text-brand">person</span>
</div>
</div>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: LoginContainer -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md bg-white border border-retro-border p-8 rounded-custom retro-shadow" data-purpose="login-card">
<div class="text-center mb-8">
<h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
<p class="text-gray-500 font-medium italic">Ready for your next adventure?</p>
</div>
<!-- BEGIN: OAuthSection -->
<div class="mb-6" data-purpose="social-login">
<button class="w-full flex items-center justify-center space-x-3 py-3 border-2 border-retro-border rounded-custom hover:bg-gray-50 transition-colors font-medium">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Sign in with Google</span>
</button>
</div>
<!-- END: OAuthSection -->
<div class="relative mb-6" data-purpose="divider">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-retro-border"></div>
</div>
<div class="relative flex justify-center text-sm uppercase">
<span class="bg-white px-4 text-gray-400 font-bold tracking-widest">or</span>
</div>
</div>
<!-- BEGIN: EmailLoginForm -->
<form action="#" class="space-y-5" data-purpose="credentials-form" method="POST">
<div>
<label class="block text-sm font-bold uppercase tracking-wider text-gray-700 mb-1" for="email">Email Address</label>
<input class="w-full rounded-custom px-4 py-3 input-vintage" id="email" name="email" placeholder="passenger@airline.com" required="" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block text-sm font-bold uppercase tracking-wider text-gray-700" for="password">Password</label>
<a class="text-xs font-bold text-brand hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full rounded-custom px-4 py-3 input-vintage" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 px-4 rounded-custom transition-all duration-200 uppercase tracking-widest text-sm shadow-md active:transform active:translate-y-0.5" data-purpose="submit-button" type="submit">
          Sign in with Email
        </button>
</form>
<!-- END: EmailLoginForm -->
<!-- BEGIN: SignupLink -->
<div class="mt-8 text-center" data-purpose="footer-links">
<p class="text-sm text-gray-600">
          Don't have an account? 
          <a class="text-brand font-bold hover:underline" href="#">Create one</a>
</p>
</div>
<!-- END: SignupLink -->
</div>
</main>
<!-- END: LoginContainer -->
<!-- BEGIN: MainFooter -->
<footer class="py-6 px-6 border-t border-retro-border flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-medium text-gray-400 uppercase tracking-widest" data-purpose="site-footer">
<div class="">© 1968 FLYX CORPORATIONS</div>
<div class="flex space-x-6">
<a class="hover:text-brand" href="#">Terms</a>
<a class="hover:text-brand" href="#">Privacy</a>
<a class="hover:text-brand" href="#">Support</a>
</div>
</footer>
<!-- END: MainFooter -->
</body></html>
